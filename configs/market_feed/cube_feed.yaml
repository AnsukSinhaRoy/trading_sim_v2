market_feed:
  type: sanitized_matrix_store_1m

  # IMPORTANT: point to the cube store root
  store_dir: "E:/data_1m/processed_data/nifty500/1m_cube_store_repaired_v2"

  # Pick a window (start/end must fall on available dates)
  start: "2015-02-02 09:15:00"
  end:   "2025-07-25 15:30:00"

  # How fast to replay
  # fast = no sleeping, real_time = sleeps to match clock, step = manual stepping (if supported)
  speed: fast

  # Optional: if supported by your feed, you can restrict symbols
  # symbols: ["reliance", "tcs"]

  # Guardrail: ignore dead / placeholder / corrupt quotes at or below this price.
  # This prevents absurd share quantities when a bad bar comes through as Rs.0.
  min_price: 1.0
  max_abs_return: 0.35
