market_feed:
  type: sanitized_matrix_store_1m
  store_dir: "CHANGE_ME_MATRIX_STORE_DIR"

  start: "2024-01-01 09:15:00"
  end:   "2024-01-01 15:30:00"

  # Optional subset:
  # symbols: ["RELIANCE", "TCS"]

  speed: fast

  # Reject any minute move larger than this, relative to the last accepted price.
  # This is a runtime guardrail, not a replacement for offline repair.
  max_abs_return: 0.35
  min_price: 1.0e-9
  stats_every_rows: 0
