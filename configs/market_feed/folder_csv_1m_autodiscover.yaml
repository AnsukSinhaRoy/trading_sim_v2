market_feed:
  type: folder_1m
  format: csv

  # Folder containing files like:
  #   RELIANCE_minute.csv
  #   TCS_minute.csv
  # OR lowercase like reliance_minute.csv
  data_dir: "E:/data_1m"

  # Your filenames are like: reliance_minute.csv
  file_pattern: "{symbol}_minute.{ext}"

  # Your schema
  timestamp_col: "date"
  price_col: "close"

  # Time slice (start small)
  start: "2024-01-01 09:15:00"
  end:   "2024-01-01 15:30:00"

  # IMPORTANT: symbols can be omitted entirely.
  # The feed will autodiscover by scanning data_dir for files matching file_pattern.
  # symbols: null

  discover_symbols: true
  discover_recursive: true

  # Optional: intersect with a universe JSON list (keeps universe ordering)
  # universe_file: "path/to/universe_symbols.json"
  universe_mode: "intersect"

  freq: "1min"
  fill: "ffill"
  speed: fast

  progress_every: 25
