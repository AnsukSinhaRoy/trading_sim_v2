market_feed:
  type: folder_1m
  format: csv

  # Folder containing per-symbol files, e.g.:
  #   data_dir/RELIANCE.csv
  #   data_dir/TCS.csv
  data_dir: "E:/data_1m"

  # Default file naming: {symbol}.csv (or {symbol}.parquet)
  file_pattern: "{symbol}.{ext}"

  # Your file schema:
  timestamp_col: "datetime"   # change to your column name (e.g. "date", "timestamp")
  price_col: "close"          # change to "Close" etc.

  # Choose a slice to run (smaller first)
  start: "2024-01-01 09:15:00"
  end:   "2024-01-01 15:30:00"   # OR use minutes: 375

  # Multi-asset polling universe
  symbols: ["AAA", "BBB", "CCC"]  # replace with real symbols

  # Align to a calendar and fill missing ticks
  freq: "1min"
  fill: "ffill"

  # fast = replay instantly, realtime = 1 tick per second
  speed: fast
